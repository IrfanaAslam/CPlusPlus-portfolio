name: Build all C++ programs

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile every .cpp file
        run: |
          set -e
          status=0
          while IFS= read -r -d '' file; do
            echo "Compiling $file"
            if ! g++ -std=c++17 -Wall -o /tmp/out "$file"; then
              echo "FAILED: $file"
              status=1
            fi
          done < <(find . -name "*.cpp" -print0)
          exit $status
